<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProRAB - Aplikasi Pembuat RAB & Invoice</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (untuk memproses JSX di browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        /* Custom Scrollbar agar lebih rapi */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Mencegah zoom di input pada mobile */
        input, select, textarea { font-size: 16px; }
        
        /* Animasi loading */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Mencegah scroll saat tanda tangan di mobile */
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. SETUP GLOBAL VARIABLES ---
        const { useState, useEffect, useReducer, useContext, createContext, useMemo, useRef } = React;
        
        // --- 2. ICON DEFINITIONS (MANUAL & STABLE) ---
        
        const IconBase = ({ children, className = "", size = 24, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>;
        const Plus = (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></IconBase>;
        const Calculator = (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></IconBase>;
        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>;
        const ChevronDown = (props) => <IconBase {...props}><path d="m6 9 6 6 6-6"/></IconBase>;
        const ChevronUp = (props) => <IconBase {...props}><path d="m18 15-6-6-6 6"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const Loader2 = (props) => <IconBase {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconBase>;
        const DownloadCloud = (props) => <IconBase {...props}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconBase>;
        const Upload = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const ImageIcon = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></IconBase>;
        const ArrowUp = (props) => <IconBase {...props}><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></IconBase>;
        const ArrowDown = (props) => <IconBase {...props}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></IconBase>;
        const Receipt = (props) => <IconBase {...props}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1Z"/><path d="M16 8h-6"/><path d="M16 12h-6"/><path d="M10 16h-6"/></IconBase>;
        const FileCheck = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>;
        const Sparkles = (props) => <IconBase {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M21 21v-4"/><path d="M17 19h4"/></IconBase>;
        const PenTool = (props) => <IconBase {...props}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></IconBase>;
        const RotateCcw = (props) => <IconBase {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 5v7h7"/></IconBase>;

        // --- 3. CORE LOGIC ---

        const HISTORY_KEY = 'prorab_item_history';

        // Helper untuk mengambil history
        const getItemHistory = () => {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
        };

        // Helper untuk menyimpan/memperbarui history
        const addToHistory = (name, unit, price) => {
            if (!name || name.trim().length < 2) return; 
            const history = getItemHistory();
            const cleanName = name.trim();
            const newHistory = history.filter(item => item.name.toLowerCase() !== cleanName.toLowerCase());
            newHistory.unshift({ name: cleanName, unit, price });
            const limitedHistory = newHistory.slice(0, 200);
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(limitedHistory)); } catch (e) { console.warn("History storage full"); }
        };

        /**
         * ==========================================
         * UTILITIES & TYPES
         * ==========================================
         */

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0,
            }).format(amount);
        };

        const COMMON_UNITS = ["ls", "m'", "m2", "m3", "kg", "ton", "bh", "unit", "set", "titik", "btg", "lbr", "zak", "roll", "jam", "hari"];

        // Initial State Generator Function
        const getInitialData = () => ({
            activeTab: 'rab', 
            profile: {
                companyName: "Karya Mandiri Konstruksi",
                address: "Jl. Merdeka No. 45, Jakarta Selatan",
                phone: "0812-3456-7890",
                email: "admin@karyamandiri.com",
                logoUrl: "", 
                signatureUrl: "", 
                footerText: "Garansi Pemeliharaan 3 Bulan",
                clientName: "Bpk. Budi Santoso",
                projectLocation: "Renovasi Rumah Cluster Harmoni",
                proposalDate: new Date().toISOString().split('T')[0]
            },
            invoice: {
                number: `INV/${new Date().getFullYear()}/001`,
                date: new Date().toISOString().split('T')[0],
                dueDate: "", 
                selectedTermId: "", 
                bankName: "BCA",
                accountNumber: "123-456-7890",
                accountHolder: "Karya Mandiri Konstruksi",
                notes: "Mohon ditransfer sesuai nominal tertera.",
                enablePenalty: false, 
                penaltyText: "Pembayaran melewati jatuh tempo dikenakan denda 1% per hari." 
            },
            sections: [
                {
                    id: 1,
                    name: "Pekerjaan Persiapan",
                    items: [
                        { id: 101, name: "Pembersihan Lahan", qty: 1, unit: "ls", price: 500000 },
                        { id: 102, name: "Mobilisasi Alat & Tukang", qty: 1, unit: "ls", price: 1500000 }
                    ]
                },
                {
                    id: 2,
                    name: "Pekerjaan Lantai",
                    items: [
                        { id: 201, name: "Pasang Keramik 60x60", qty: 45, unit: "m2", price: 185000 },
                        { id: 202, name: "Pasang Plint Lantai", qty: 30, unit: "m'", price: 45000 }
                    ]
                }
            ],
            settings: {
                taxRate: 11, 
                useTax: false,
                discountType: 'percent', 
                discountValue: 0
            },
            paymentTerms: [
                { id: 1, name: "DP (Down Payment)", percentage: 30, note: "Saat SPK ditandatangani" },
                { id: 2, name: "Termin 1 (Progress 50%)", percentage: 40, note: "Saat struktur atap naik" },
                { id: 3, name: "Pelunasan (Retensi)", percentage: 30, note: "Setelah serah terima kunci" }
            ]
        });

        // Initialize state
        const initialData = getInitialData();

        /**
         * ==========================================
         * STORE / STATE MANAGEMENT
         * ==========================================
         */

        const AppContext = createContext();

        const appReducer = (state, action) => {
            switch (action.type) {
                case 'SET_TAB':
                    return { ...state, activeTab: action.payload };
                case 'UPDATE_PROFILE':
                    return { ...state, profile: { ...state.profile, ...action.payload } };
                case 'UPDATE_INVOICE':
                    return { ...state, invoice: { ...state.invoice, ...action.payload } };
                case 'UPDATE_SETTINGS':
                    return { ...state, settings: { ...state.settings, ...action.payload } };
                case 'ADD_SECTION':
                    return { ...state, sections: [...state.sections, { id: Date.now(), name: "Pekerjaan Baru", items: [] }] };
                case 'DELETE_SECTION':
                    return { ...state, sections: state.sections.filter(s => s.id !== action.payload) };
                case 'UPDATE_SECTION_NAME':
                    return { ...state, sections: state.sections.map(s => s.id === action.payload.id ? { ...s, name: action.payload.name } : s) };
                case 'MOVE_SECTION': {
                    const { index, direction } = action.payload;
                    if (index < 0 || index >= state.sections.length) return state;
                    const newIndex = index + direction;
                    if (newIndex < 0 || newIndex >= state.sections.length) return state;
                    const newSections = [...state.sections];
                    [newSections[index], newSections[newIndex]] = [newSections[newIndex], newSections[index]];
                    return { ...state, sections: newSections };
                }
                case 'ADD_ITEM':
                    return { ...state, sections: state.sections.map(s => s.id === action.payload.sectionId ? { ...s, items: [...s.items, { id: Date.now(), name: "", qty: 1, unit: "ls", price: 0 }] } : s) };
                case 'DELETE_ITEM':
                    return { ...state, sections: state.sections.map(s => s.id === action.payload.sectionId ? { ...s, items: s.items.filter(i => i.id !== action.payload.itemId) } : s) };
                case 'UPDATE_ITEM':
                    return { ...state, sections: state.sections.map(s => s.id === action.payload.sectionId ? { ...s, items: s.items.map(i => i.id === action.payload.itemId ? { ...i, ...action.payload.data } : i) } : s) };
                case 'UPDATE_ITEM_MULTIPLE':
                    return { ...state, sections: state.sections.map(s => s.id === action.payload.sectionId ? { ...s, items: s.items.map(i => i.id === action.payload.itemId ? { ...i, ...action.payload.data } : i) } : s) };
                case 'UPDATE_TERM':
                    return { ...state, paymentTerms: state.paymentTerms.map(t => t.id === action.payload.id ? { ...t, ...action.payload.data } : t) };
                case 'ADD_TERM':
                    return { ...state, paymentTerms: [...state.paymentTerms, { id: Date.now(), name: "Termin Baru", percentage: 0, note: "" }] };
                case 'DELETE_TERM':
                    return { ...state, paymentTerms: state.paymentTerms.filter(t => t.id !== action.payload) };
                case 'LOAD_DATA':
                    return { ...initialData, ...action.payload, invoice: { ...initialData.invoice, ...(action.payload.invoice || {}) }, profile: { ...initialData.profile, ...(action.payload.profile || {}) } };
                case 'RESET_DATA':
                    return getInitialData();
                default:
                    return state;
            }
        };

        const useProposalLogic = (state) => {
            const subTotal = useMemo(() => state.sections.reduce((acc, section) => acc + section.items.reduce((sum, item) => sum + (item.qty * item.price), 0), 0), [state.sections]);
            const discountAmount = useMemo(() => state.settings.discountType === 'percent' ? subTotal * (state.settings.discountValue / 100) : state.settings.discountValue, [subTotal, state.settings]);
            const afterDiscount = subTotal - discountAmount;
            const taxAmount = useMemo(() => state.settings.useTax ? afterDiscount * (state.settings.taxRate / 100) : 0, [afterDiscount, state.settings]);
            const grandTotal = afterDiscount + taxAmount;
            const totalTermPercent = useMemo(() => state.paymentTerms.reduce((sum, term) => sum + parseFloat(term.percentage || 0), 0), [state.paymentTerms]);
            return { subTotal, discountAmount, afterDiscount, taxAmount, grandTotal, totalTermPercent };
        };

        const usePWAInstall = () => {
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isInstallable, setIsInstallable] = useState(false);
            useEffect(() => {
                const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setIsInstallable(true); };
                window.addEventListener('beforeinstallprompt', handler);
                return () => window.removeEventListener('beforeinstallprompt', handler);
            }, []);
            const installApp = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                setDeferredPrompt(null);
                setIsInstallable(false);
            };
            return { isInstallable, installApp };
        };

        // --- PDF GENERATION LOGIC ---
        const generateRABPDF = (state, calculations) => {
            if (typeof window.jspdf === 'undefined') { alert("Library PDF belum termuat."); return; }
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.width;
                let textX = 15;
                if (state.profile.logoUrl) {
                    textX = 40;
                    try { doc.addImage(state.profile.logoUrl, 'PNG', 15, 15, 20, 20); } catch (e) {}
                }
                doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text(state.profile.companyName.toUpperCase(), textX, 20);
                doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.text(state.profile.address, textX, 26);
                doc.text(`Telp/WA: ${state.profile.phone}`, textX, 31);
                doc.line(15, 38, pageWidth - 15, 38);
                doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("PENAWARAN HARGA (RAB)", pageWidth / 2, 50, { align: "center" });
                doc.setFontSize(10); doc.setFont("helvetica", "normal");
                doc.text(`Kepada Yth: ${state.profile.clientName}`, 15, 62);
                doc.text(`Proyek: ${state.profile.projectLocation}`, 15, 67);
                doc.text(`Tanggal: ${state.profile.proposalDate}`, pageWidth - 15, 62, { align: "right" });

                let finalY = 78;
                state.sections.forEach((section) => {
                    doc.setFont("helvetica", "bold"); doc.setFillColor(240, 240, 240);
                    doc.rect(14, finalY, pageWidth - 28, 8, "F");
                    doc.text(section.name.toUpperCase(), 16, finalY + 5.5);
                    finalY += 8;
                    const tableBody = section.items.map(item => [item.name, `${item.qty} ${item.unit}`, formatCurrency(item.price), formatCurrency(item.qty * item.price)]);
                    doc.autoTable({ 
                        startY: finalY, 
                        head: [['Uraian Pekerjaan', 'Volume', 'Harga Satuan', 'Total']],
                        body: tableBody, 
                        theme: 'plain', 
                        styles: { fontSize: 9, cellPadding: 1.5 }, 
                        headStyles: { fillColor: [255, 255, 255], textColor: [0,0,0], fontStyle: 'bold', lineWidth: {bottom: 0.1} }, 
                        columnStyles: { 
                            0: { cellWidth: 'auto', halign: 'left' }, 
                            1: { cellWidth: 25, halign: 'center' }, 
                            2: { cellWidth: 40, halign: 'right' }, 
                            3: { cellWidth: 40, halign: 'right' }  
                        }, 
                        margin: { left: 15, right: 15 } 
                    });
                    finalY = doc.lastAutoTable.finalY + 5;
                });

                if (finalY > 230) { doc.addPage(); finalY = 20; }
                const summaryX = pageWidth - 100;
                const valueX = pageWidth - 15;
                doc.setFontSize(10); doc.text("Subtotal:", summaryX, finalY); doc.text(formatCurrency(calculations.subTotal), valueX, finalY, { align: "right" }); finalY += 6;
                if (calculations.discountAmount > 0) { doc.text(`Diskon:`, summaryX, finalY); doc.text(`- ${formatCurrency(calculations.discountAmount)}`, valueX, finalY, { align: "right" }); finalY += 6; }
                if (state.settings.useTax) { doc.text(`PPN (${state.settings.taxRate}%):`, summaryX, finalY); doc.text(formatCurrency(calculations.taxAmount), valueX, finalY, { align: "right" }); finalY += 6; }
                doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.line(summaryX, finalY - 3, pageWidth - 15, finalY - 3); doc.text("GRAND TOTAL:", summaryX, finalY + 2); doc.text(formatCurrency(calculations.grandTotal), valueX, finalY + 2, { align: "right" }); finalY += 15;

                doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("Termin Pembayaran:", 15, finalY); finalY += 5; doc.setFont("helvetica", "normal");
                state.paymentTerms.forEach(term => { const nominal = calculations.grandTotal * (term.percentage / 100); doc.text(`• ${term.name} (${term.percentage}%): ${formatCurrency(nominal)}`, 20, finalY); finalY += 6; });
                
                finalY += 15; if (finalY > 240) { doc.addPage(); finalY = 30; }
                
                // --- SIGNATURE LOGIC ---
                const sigY = finalY;
                doc.text("Disetujui Oleh (Klien),", 40, sigY, { align: "center" }); 
                doc.text("Hormat Kami,", pageWidth - 40, sigY, { align: "center" });

                if (state.profile.signatureUrl) {
                    try {
                        const sigImgWidth = 30;
                        const sigImgHeight = 15;
                        const sigX = (pageWidth - 40) - (sigImgWidth / 2);
                        doc.addImage(state.profile.signatureUrl, 'PNG', sigX, sigY + 3, sigImgWidth, sigImgHeight);
                    } catch (e) { console.warn("Error adding signature to PDF", e); }
                }

                doc.text("_______________________", 40, sigY + 25, { align: "center" }); 
                doc.text("_______________________", pageWidth - 40, sigY + 25, { align: "center" });
                doc.text(state.profile.clientName, 40, sigY + 30, { align: "center" }); 
                doc.text(state.profile.companyName, pageWidth - 40, sigY + 30, { align: "center" });
                
                doc.save(`RAB_${state.profile.clientName.replace(/\s+/g, '_')}.pdf`);
            } catch (err) { alert("Error PDF: " + err.message); }
        };

        const generateInvoicePDF = (state, calculations) => {
            if (typeof window.jspdf === 'undefined') { alert("Library PDF belum siap."); return; }
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.width;
                const selectedTerm = state.paymentTerms.find(t => String(t.id) === String(state.invoice.selectedTermId));
                if (!selectedTerm) { alert("Pilih termin dulu!"); return; }
                const invoiceAmount = calculations.grandTotal * (selectedTerm.percentage / 100);
                
                let textX = 15;
                if (state.profile.logoUrl) { textX = 40; try { doc.addImage(state.profile.logoUrl, 'PNG', 15, 15, 20, 20); } catch (e) {} }
                doc.setFontSize(18); doc.setFont("helvetica", "bold"); doc.text(state.profile.companyName.toUpperCase(), textX, 20);
                doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.text(state.profile.address, textX, 26); doc.line(15, 38, pageWidth - 15, 38);

                doc.setFontSize(24); doc.setFont("helvetica", "bold"); doc.setTextColor(40, 40, 40); doc.text("INVOICE", pageWidth - 15, 55, { align: "right" });
                doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(0, 0, 0);
                doc.text("TAGIHAN KEPADA:", 15, 55); doc.setFont("helvetica", "bold"); doc.text(state.profile.clientName, 15, 60);
                doc.setFont("helvetica", "normal"); doc.text(state.profile.projectLocation, 15, 65);
                
                let headerY = 65;
                doc.text(`Nomor Invoice:`, pageWidth - 60, headerY); doc.text(state.invoice.number || '-', pageWidth - 15, headerY, { align: "right" });
                headerY += 5; doc.text(`Tanggal:`, pageWidth - 60, headerY); doc.text(state.invoice.date || '-', pageWidth - 15, headerY, { align: "right" });
                if (state.invoice.dueDate) { headerY += 5; doc.text(`Jatuh Tempo:`, pageWidth - 60, headerY); doc.text(state.invoice.dueDate, pageWidth - 15, headerY, { align: "right" }); }

                const finalY = headerY + 15;
                doc.autoTable({ startY: finalY, head: [['Deskripsi', 'Persentase', 'Total']], body: [[`${selectedTerm.name}\n${selectedTerm.note || ''}`, `${selectedTerm.percentage}%`, formatCurrency(invoiceAmount)]], theme: 'plain', styles: { fontSize: 10, cellPadding: 3 }, headStyles: { fillColor: [50, 50, 50], textColor: [255,255,255], fontStyle: 'bold' }, columnStyles: { 0: { cellWidth: 'auto' }, 1: { cellWidth: 30, halign: 'center' }, 2: { cellWidth: 50, halign: 'right', fontStyle: 'bold' } }, margin: { left: 15, right: 15 } });

                let yPos = doc.lastAutoTable.finalY + 10;
                doc.setFontSize(12); doc.setFont("helvetica", "bold"); doc.text("TOTAL TAGIHAN", pageWidth - 110, yPos); doc.text(formatCurrency(invoiceAmount), pageWidth - 15, yPos, { align: "right" });
                
                yPos += 20; const boxHeight = state.invoice.enablePenalty ? 50 : 40;
                doc.setFillColor(245, 245, 245); doc.roundedRect(15, yPos, pageWidth - 30, boxHeight, 3, 3, "F");
                doc.setFontSize(10); doc.setTextColor(0); doc.text("Instruksi Pembayaran:", 20, yPos + 8);

        const SignatureModal = ({ isOpen, onClose, onSave }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);

            useEffect(() => {
                if (isOpen && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#000000';
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }, [isOpen]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const startDrawing = (e) => {
                // Prevent scrolling on touch devices
                if (e.cancelable) e.preventDefault();
                
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                if (e.cancelable) e.preventDefault();
                
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const stopDrawing = () => {
                setIsDrawing(false);
            };

            const clear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            const handleSave = () => {
                const canvas = canvasRef.current;
                const dataUrl = canvas.toDataURL('image/png');
                onSave(dataUrl);
                onClose();
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-300">

                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                        </div>
                        <div className="p-4 border-t flex gap-2 justify-end bg-gray-50">
                            <Button variant="danger" size="sm" onClick={clear}>Hapus</Button>
                            <Button variant="primary" size="sm" onClick={handleSave}>Simpan</Button>
                        </div>
                    </div>

                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const MAX_WIDTH = 800;
                            const MAX_HEIGHT = 800;
                            if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                            else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            let outputMime = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
                            resolve(canvas.toDataURL(outputMime, 0.7));
                        };
                    };
                });

                        <div className="flex justify-between items-center py-2 border-t border-dashed border-gray-300">
                            <div className="flex items-center gap-2">
                                <input type="checkbox" id="tax" checked={s.useTax} onChange={(e) => dispatch({ type: 'UPDATE_SETTINGS', payload: { useTax: e.target.checked } })} className="rounded text-blue-600 focus:ring-blue-500" />
                                <label htmlFor="tax" className="text-sm text-gray-600">Pajak PPN ({s.taxRate}%)</label>
                            </div>
                            <span className="text-sm font-medium text-gray-700">+ {formatCurrency(calculations.taxAmount)}</span>
                        </div>
                        <div className="flex justify-between items-center pt-3 border-t-2 border-gray-800">
                            <span className="text-lg font-bold text-gray-900">GRAND TOTAL</span>
                            <span className="text-xl font-bold text-blue-700">{formatCurrency(calculations.grandTotal)}</span>
                        </div>
                    </div>
                </Card>
            );
        };

        const PaymentTerms = ({ calculations }) => {
            const { state, dispatch } = useContext(AppContext);
            const terms = state.paymentTerms;
            const { totalTermPercent } = calculations;
            const isInvalid = totalTermPercent !== 100;

            return (
                <Card className="p-3 md:p-6 mb-4 md:mb-8">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Calculator className="w-5 h-5 text-blue-600" /> Termin Pembayaran</h2>
                        <div className={`text-sm font-bold px-3 py-1 rounded-full ${isInvalid ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>Total: {totalTermPercent}%</div>
                    </div>

                    <div className="space-y-3">
                        {terms.map(term => (
                            <div key={term.id} className="grid grid-cols-12 gap-3 items-start border p-3 rounded-lg bg-gray-50">
                                <div className="col-span-12 md:col-span-5">
                                    <label className="text-xs text-gray-500">Nama Termin</label>
                                    <input className="w-full text-sm font-medium border-b border-gray-300 bg-transparent focus:outline-none" value={term.name} onChange={(e) => dispatch({ type: 'UPDATE_TERM', payload: { id: term.id, data: { name: e.target.value } } })} />
                                    <input className="w-full text-xs text-gray-500 mt-1 bg-transparent focus:outline-none" placeholder="Catatan" value={term.note} onChange={(e) => dispatch({ type: 'UPDATE_TERM', payload: { id: term.id, data: { note: e.target.value } } })} />
                                </div>
                                <div className="col-span-4 md:col-span-2">
                                    <label className="text-xs text-gray-500">Persen (%)</label>
                                    <input type="number" className="w-full text-sm font-bold border rounded p-1 text-center" value={term.percentage} onChange={(e) => dispatch({ type: 'UPDATE_TERM', payload: { id: term.id, data: { percentage: parseFloat(e.target.value) || 0 } } })} />
                                </div>
                                <div className="col-span-6 md:col-span-4">
                                    <label className="text-xs text-gray-500">Nominal</label>
                                    <div className="text-sm font-bold text-gray-700 pt-1">{formatCurrency(calculations.grandTotal * (term.percentage / 100))}</div>
                                </div>
                                <div className="col-span-2 md:col-span-1 flex justify-end">
                                    <button onClick={() => dispatch({ type: 'DELETE_TERM', payload: term.id })} className="text-red-400"><Trash2 size={16} /></button>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <div className="mt-4 flex gap-2">
                        <Button variant="secondary" size="sm" onClick={() => dispatch({ type: 'ADD_TERM' })}><Plus size={16} className="mr-1" /> Tambah Termin</Button>
                        {isInvalid && <div className="flex items-center text-xs text-red-500 font-medium"><AlertCircle size={14} className="mr-1" /> Total persentase harus 100%</div>}
                    </div>
                </Card>
            );
        };

        const InvoiceGenerator = ({ calculations }) => {
            const { state, dispatch } = useContext(AppContext);
            const inv = state.invoice;
            const updateInv = (field, val) => dispatch({ type: 'UPDATE_INVOICE', payload: { [field]: val } });

            const selectedTerm = state.paymentTerms.find(t => String(t.id) === String(inv.selectedTermId));
            const invoiceAmount = selectedTerm ? calculations.grandTotal * (selectedTerm.percentage / 100) : 0;

            return (
                <div className="space-y-6">
                    <Card className="p-3 md:p-6 bg-blue-50 border-blue-200">
                        <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <Receipt className="w-5 h-5 text-blue-600" />
                            Detail Tagihan
                        </h2>
                        
                        <div className="mb-4">
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Pilih Termin untuk Ditagih</label>
                            <select 
                                className="w-full p-2 border border-gray-300 rounded-lg bg-white focus:ring-2 focus:ring-blue-500"
                                value={inv.selectedTermId}
                                onChange={(e) => updateInv('selectedTermId', e.target.value)}
                            >
                                <option value="">-- Pilih Termin --</option>
                                {state.paymentTerms.map(term => (
                                    <option key={term.id} value={term.id}>{term.name} ({term.percentage}%)</option>
                                ))}
                            </select>
                        </div>

                        {selectedTerm ? (
                            <div className="bg-white p-4 rounded-lg border border-blue-100 flex justify-between items-center mb-4 shadow-sm">
                                <div>
                                    <p className="text-xs text-gray-500">Nominal Tagihan</p>
                                    <p className="text-xl font-bold text-blue-700">{formatCurrency(invoiceAmount)}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs text-gray-500">Persentase</p>
                                    <p className="font-bold text-gray-800">{selectedTerm.percentage}%</p>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-4 rounded-lg border border-dashed border-gray-300 text-center text-sm text-gray-500 mb-4">
                                Belum ada termin dipilih. Pilih salah satu di atas.
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <Input label="Nomor Invoice" value={inv.number} onChange={(e) => updateInv('number', e.target.value)} />
                            <Input label="Tanggal Invoice" type="date" value={inv.date} onChange={(e) => updateInv('date', e.target.value)} />
                            <Input label="Jatuh Tempo (Expired)" type="date" value={inv.dueDate} onChange={(e) => updateInv('dueDate', e.target.value)} />
                        </div>
                    </Card>

                    <Card className="p-3 md:p-6">
                        <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <FileCheck className="w-5 h-5 text-green-600" />
                            Instruksi Pembayaran (Rekening)
                        </h2>
                        <div className="grid grid-cols-1 gap-4">
                            <Input label="Nama Bank" value={inv.bankName} onChange={(e) => updateInv('bankName', e.target.value)} placeholder="Contoh: BCA" />
                            <Input label="Nomor Rekening" value={inv.accountNumber} onChange={(e) => updateInv('accountNumber', e.target.value)} />
                            <Input label="Atas Nama (Pemilik Rekening)" value={inv.accountHolder} onChange={(e) => updateInv('accountHolder', e.target.value)} />
                            <Input label="Catatan Tambahan" value={inv.notes} onChange={(e) => updateInv('notes', e.target.value)} />
                        </div>

                        <div className="mt-6 pt-4 border-t border-gray-200">
                            <div className="flex items-center gap-2 mb-2">
                                <input 
                                    type="checkbox" 
                                    id="penaltyToggle"
                                    checked={inv.enablePenalty}
                                    onChange={(e) => updateInv('enablePenalty', e.target.checked)}
                                    className="rounded text-red-600 focus:ring-red-500"
                                />
                                <label htmlFor="penaltyToggle" className="text-sm font-semibold text-gray-700">Aktifkan Denda Keterlambatan</label>
                            </div>
                            
                            {inv.enablePenalty && (
                                <div className="bg-red-50 p-3 rounded-lg border border-red-200 animate-in fade-in slide-in-from-top-2 duration-300">
                                    <label className="text-xs font-semibold text-red-600 mb-1 block">Teks Peringatan Denda</label>
                                    <input 
                                        className="w-full text-sm text-red-700 bg-white border border-red-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-red-500"
                                        value={inv.penaltyText}
                                        onChange={(e) => updateInv('penaltyText', e.target.value)}
                                    />
                                    <div className="flex items-center mt-1 text-xs text-red-500">
                                        <AlertCircle size={12} className="mr-1" />
                                        Akan muncul tulisan merah kecil di bagian bawah invoice.
                                    </div>
                                </div>
                            )}
                        </div>
                    </Card>
                </div>
            );
        };

        const AppContent = () => {
            const { state, dispatch } = useContext(AppContext);
            const calculations = useProposalLogic(state);
            const [isPdfReady, setIsPdfReady] = useState(false);
            const { isInstallable, installApp } = usePWAInstall();

            useEffect(() => {
                const loadScript = (src) => {
                    return new Promise((resolve, reject) => {
                        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
                        const script = document.createElement('script');
                        script.src = src; script.async = true;
                        script.onload = resolve; script.onerror = reject;
                        document.body.appendChild(script);
                    });
                };
                loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js")
                    .then(() => loadScript("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"))
                    .then(() => setIsPdfReady(true))
                    .catch((err) => console.error("PDF Fail", err));
            }, []);

            useEffect(() => {
                const saved = localStorage.getItem('prorab-data');
                if (saved) dispatch({ type: 'LOAD_DATA', payload: JSON.parse(saved) });
            }, []);

            useEffect(() => {
                try {
                    localStorage.setItem('prorab-data', JSON.stringify(state));
                } catch (e) {
                    console.warn("Storage penuh, data mungkin tidak tersimpan");
                }
            }, [state]);

            const handleDownload = () => {
                if (!isPdfReady) return;
                if (state.activeTab === 'rab') {
                    if (calculations.totalTermPercent !== 100) { alert("Total termin harus 100%"); return; }
                    generateRABPDF(state, calculations);
                } else {
                    generateInvoicePDF(state, calculations);
                }
            };

            const handleReset = () => {
                if (window.confirm("Apakah Anda yakin ingin mereset semua data? Data yang belum disimpan akan hilang dan kembali ke pengaturan awal.")) {
                    dispatch({ type: 'RESET_DATA' });
                }
            };

            const selectedTermForDisplay = state.activeTab === 'invoice' 
                ? state.paymentTerms.find(t => String(t.id) === String(state.invoice.selectedTermId)) 
                : null;

            const displayTotal = state.activeTab === 'rab' 
                ? calculations.grandTotal 
                : (selectedTermForDisplay ? calculations.grandTotal * (selectedTermForDisplay.percentage / 100) : 0);

            return (
                <div className="min-h-screen bg-gray-100 pb-32">
                    <header className="bg-white border-b sticky top-0 z-10">
                        <div className="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
                                <h1 className="font-bold text-xl text-gray-800 tracking-tight">ProRAB</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <Button size="sm" variant="danger" onClick={handleReset} title="Reset Data (Mulai Ulang)">
                                    <RotateCcw size={14} className="mr-1"/> Reset
                                </Button>
                                {isInstallable && (<Button size="sm" variant="outline" onClick={installApp} className="hidden md:flex"><DownloadCloud size={14} className="mr-1" /> Install App</Button>)}
                                <div className="text-xs text-gray-500 hidden md:block">v1.7 (Reset)</div>
                            </div>
                        </div>
                    </header>

                    <div className="bg-white border-b z-0 shadow-sm">
                        <div className="max-w-3xl mx-auto flex">
                            <button onClick={() => dispatch({ type: 'SET_TAB', payload: 'rab' })} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 transition-colors ${state.activeTab === 'rab' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Editor RAB</button>
                            <button onClick={() => dispatch({ type: 'SET_TAB', payload: 'invoice' })} className={`flex-1 py-3 text-sm font-bold text-center border-b-2 transition-colors ${state.activeTab === 'invoice' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>Generator Invoice</button>
                        </div>
                    </div>

                    <main className="max-w-3xl mx-auto px-0 md:px-4 py-4 md:py-6 space-y-4 md:space-y-6">
                        <BusinessProfile />
                        {state.activeTab === 'rab' ? (
                            <>
                                <div>
                                    <div className="flex justify-between items-center mb-4 px-2 md:px-0">
                                        <h3 className="text-lg font-bold text-gray-800">Rincian Pekerjaan</h3>
                                        <Button size="sm" variant="secondary" onClick={() => dispatch({ type: 'ADD_SECTION' })}><Plus size={16} className="mr-1" /> Section Baru</Button>
                                    </div>
                                    {state.sections.map((section, index) => (<RabSection key={section.id} section={section} index={index} totalSections={state.sections.length} />))}
                                    {state.sections.length === 0 && <div className="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300 text-gray-400">Belum ada item pekerjaan.</div>}
                                </div>
                                <h3 className="text-lg font-bold text-gray-800 mt-8 mb-4 px-2 md:px-0">Kalkulasi Biaya</h3>
                                <SummaryBar calculations={calculations} />
                                <PaymentTerms calculations={calculations} />
                            </>
                        ) : (
                            <InvoiceGenerator calculations={calculations} />
                        )}
                    </main>

                    <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-lg z-20">
                        <div className="max-w-3xl mx-auto flex justify-between items-center gap-4">
                            <div className="flex flex-col">
                                <span className="text-xs text-gray-500 uppercase">{state.activeTab === 'rab' ? 'Total RAB' : 'Total Tagihan'}</span>
                                <span className="font-bold text-lg text-blue-700 leading-tight">{formatCurrency(displayTotal)}</span>
                            </div>
                            <Button onClick={handleDownload} variant={isPdfReady ? "primary" : "secondary"} size="lg" disabled={!isPdfReady || (state.activeTab === 'invoice' && !selectedTermForDisplay)} className="shadow-blue-200 shadow-lg min-w-[160px]">
                                {!isPdfReady ? (<><Loader2 size={18} className="mr-2 animate-spin" /> Memuat PDF...</>) : (<><Download size={18} className="mr-2" /> {state.activeTab === 'rab' ? 'Unduh RAB' : 'Unduh Invoice'}</>)}
                            </Button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [state, dispatch] = useReducer(appReducer, initialData);
            return (
                <AppContext.Provider value={{ state, dispatch }}>
                    <AppContent />
                </AppContext.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
